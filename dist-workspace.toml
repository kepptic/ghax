[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.31.0"
# CI backends to support
ci = "github"
# The installers to generate for each app.
#
# Decision: keep everything inside kepptic/ghax. shell + powershell installers
# fetch artifacts from this repo's GitHub Releases — no external repos,
# accounts, or registries needed.
#
# Deliberately NOT enabled:
#   - homebrew  → would need a separate kepptic/homebrew-tap repo
#   - npm       → would publish @ghax/cli to npmjs.com (irreversible)
#   - msi       → Windows MSI generation; .zip in the release archive is enough
# These can be added later when there's reason to use those distribution channels.
installers = ["shell", "powershell"]
# Target platforms to build apps for (Rust target-triple syntax).
# 5 of the 6 plan-doc triples — aarch64-pc-windows-msvc dropped because the
# cargo-xwin cross-compile of `ring` (TLS, via reqwest/rustls) emits malformed
# clang args on Linux runners (`/imsvc` passed as a positional path instead of
# `-imsvc <dir>`). Affects an extremely small user base. Re-add when upstream
# fixes the flag quoting; a v0.5 native-Windows-runner job could also resolve.
targets = [
  "aarch64-apple-darwin",
  "aarch64-unknown-linux-gnu",
  "x86_64-apple-darwin",
  "x86_64-unknown-linux-gnu",
  "x86_64-pc-windows-msvc",
]
# Path that installers should place binaries in
install-path = "CARGO_HOME"
# Where to host releases
hosting = "github"
# Whether to install an updater program
install-updater = false
# Allow the release.yml workflow to be hand-edited without dist plan failing.
# The workflow header, trigger scoping (tags only, no pull_request), and
# runtime comments were manually adjusted per Phase 4A constraints.
# If you need to regenerate CI from scratch: dist generate --allow-dirty
allow-dirty = ["ci"]
# Ship the Node daemon bundle alongside the Rust binary in every release archive.
# The daemon is a Node ESM bundle (dist/ghax-daemon.mjs) that ghax spawns locally.
# RUNTIME REQUIREMENT: Node >= 20 must be installed by the end user — the daemon
# requires it. Direct-download users see this documented in README.
# The Rust CLI discovers the daemon via: (1) path relative to argv[0], (2)
# ~/.ghax/daemon/ghax-daemon.mjs, (3) GHAX_DAEMON_BUNDLE env var.
include = ["dist/ghax-daemon.mjs"]
